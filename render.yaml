services:
  - type: web
    name: rag-agent-api
    env: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.agent.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_ACCESS_TOKEN
        sync: false          # set this manually in the Render dashboard
      - key: HF_MODEL
        value: google/flan-t5-large
