services:
  - type: web
    name: rag-agent-api
    env: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.agent.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_ACCESS_TOKEN
        sync: false          # set this manually in the Render dashboard
      - key: HF_MODEL
        value: google/flan-t5-large
      - key: HF_TIMEOUT_SECONDS
        value: "40"
      - key: HF_MAX_TOKENS
        value: "256"
      - key: DISABLE_LOCAL_EMBEDDINGS
        value: "true"
      - key: MAX_CONTEXT_PROJECTS
        value: "3"
      - key: MAX_CONTEXT_HITS_PER_PROJECT
        value: "2"
      - key: MAX_CONTEXT_CHARS
        value: "6000"
