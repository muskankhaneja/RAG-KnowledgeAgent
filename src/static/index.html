<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Knowledge Base</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    :root {
      /* Canvas — GitHub dark */
      --bg:            #1f2428;
      --bg-panel:      #24292e;
      --bg-surface:    #2d333b;
      --bg-hover:      #316dca1a;
      --bg-input:      #1c2128;

      /* Brand — GitHub blue */
      --accent:        #58a6ff;
      --accent-dim:    #388bfd;
      --accent-glow:   rgba(88,166,255,0.1);
      --accent2:       #79c0ff;

      /* Semantic */
      --green:         #3fb950;
      --green-dim:     #2ea043;
      --red:           #f85149;

      /* Neutrals */
      --muted:         #444c56;
      --text:          #cdd9e5;
      --text-dim:      #8b949e;
      --text-muted:    #545d68;
      --border:        #444c56;
      --border-subtle: #2d333b;

      /* Sidebar */
      --sb-bg1:        #1c2128;
      --sb-bg2:        #22272e;
      --sb-text:       #cdd9e5;
      --sb-dim:        #768390;
      --sb-border:     #373e47;

      --radius:        6px;
      --radius-lg:     8px;
      --shadow:        0 1px 3px rgba(1,4,9,0.12), 0 8px 24px rgba(1,4,9,0.12);
      --shadow-lg:     0 8px 24px rgba(1,4,9,0.2), 0 16px 48px rgba(1,4,9,0.2);
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%; margin: 0;
      font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      font-size: 14px; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* No accent top-bar in Copilot theme */
    body::before { display: none; }

    .container { display: flex; height: 100vh; overflow: hidden; }

    /* ════════════════════════════════════
       LEFT PANE  (dark gradient sidebar)
    ════════════════════════════════════ */
    .left-pane {
      width: 300px; min-width: 220px;
      background: var(--sb-bg1);
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: none;
      border-right: 1px solid var(--sb-border);
    }
    .left-pane.hidden { display: none; }

    .pane-header {
      padding: 16px 14px 12px;
      border-bottom: 1px solid var(--sb-border);
      flex-shrink: 0; display: flex; align-items: center; gap: 10px;
    }
    .pane-header-icon {
      width: 30px; height: 30px; border-radius: 6px; flex-shrink: 0;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #fff;
      box-shadow: none;
    }
    .pane-header-title {
      font-size: 0.95em; font-weight: 800;
      color: #fff; letter-spacing: -0.02em;
    }
    .pane-header-sub {
      font-size: 0.7em; color: var(--sb-dim);
      margin-top: 1px; font-weight: 400;
    }

    .left-top    { flex: 1; overflow-y: auto; padding: 12px 10px 4px; }
    .left-bottom {
      flex-shrink: 0; padding: 10px 10px 14px;
      border-top: 1px solid var(--sb-border);
    }

    /* Section label in sidebar */
    .section-label {
      font-size: 0.65em; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--sb-dim);
      padding: 0 4px 6px; margin-bottom: 4px;
    }

    /* ── Collection items ── */
    .project-item {
      border: 1px solid var(--sb-border);
      border-radius: var(--radius);
      margin-bottom: 5px; overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
      background: rgba(255,255,255,0.04);
    }
    .project-item:hover { border-color: rgba(165,180,252,0.4); background: rgba(255,255,255,0.07); }

    .project-header {
      display: flex; align-items: center;
      padding: 8px 10px; cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .project-header:hover { background: rgba(255,255,255,0.05); }

    .project-chevron {
      font-size: 8px; color: var(--sb-dim);
      margin-right: 7px; transition: transform 0.2s; flex-shrink: 0;
    }
    .project-name {
      flex: 1; font-size: 0.85em; font-weight: 600;
      color: var(--sb-text); overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .project-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .project-actions button {
      padding: 3px 7px; font-size: 0.7em;
      background: transparent;
      border: 1px solid var(--sb-border);
      color: var(--sb-dim); border-radius: 5px;
    }
    .project-actions button:hover {
      background: rgba(255,255,255,0.1); color: #fff;
      border-color: rgba(165,180,252,0.5);
    }

    .project-docs {
      display: none;
      background: rgba(0,0,0,0.2);
      border-top: 1px solid var(--sb-border);
      padding: 6px 10px 8px;
    }
    .project-docs.open { display: block; }

    .doc-item {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.75em; color: var(--sb-dim);
      padding: 4px 0; border-bottom: 1px solid var(--sb-border);
      gap: 6px;
    }
    .doc-item:last-child { border-bottom: none; }
    .doc-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .doc-item button {
      padding: 1px 6px; font-size: 0.72em;
      background: transparent; border: 1px solid var(--sb-border);
      color: var(--sb-dim); flex-shrink: 0; border-radius: 4px;
    }
    .doc-item button:hover { border-color: #ef4444; color: #f87171; }
    .no-docs { font-size: 0.75em; color: var(--sb-dim); font-style: italic; padding: 2px 0; }

    /* ── Session items ── */
    .session-item {
      display: flex; flex-direction: column; gap: 2px;
      padding: 8px 10px; border-radius: var(--radius);
      cursor: pointer; border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      margin-bottom: 3px;
    }
    .session-item:hover { background: rgba(79,142,247,0.08); border-color: var(--sb-border); }
    .session-item.active {
      background: rgba(79,142,247,0.15);
      border-color: rgba(79,142,247,0.4);
    }
    .session-title {
      font-size: 0.82em; font-weight: 600; color: var(--sb-text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .session-meta {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.7em; color: var(--sb-dim);
    }
    .session-del {
      padding: 1px 5px !important; font-size: 0.72em !important;
      background: transparent !important; border: 1px solid transparent !important;
      color: var(--sb-dim) !important; border-radius: 4px !important;
      opacity: 0; transition: opacity 0.15s;
    }
    .session-item:hover .session-del { opacity: 1; }
    .session-del:hover { border-color: var(--red) !important; color: var(--red) !important; }

    /* ── Cancel button ── */
    button.btn-cancel {
      background: rgba(239,68,68,0.15); color: #f87171;
      border: 1px solid rgba(239,68,68,0.4) !important;
      box-shadow: none !important;
    }
    button.btn-cancel:hover { background: rgba(239,68,68,0.25) !important; }

    /* ── Sidebar action buttons ── */
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
    .action-grid .full { grid-column: 1 / -1; }

    /* ── Global button base ── */
    button {
      display: inline-flex; align-items: center; justify-content: center; gap: 5px;
      padding: 7px 12px; border: 1px solid transparent; border-radius: var(--radius);
      font-family: inherit; font-size: 0.82em; font-weight: 700;
      cursor: pointer; transition: all 0.18s; white-space: nowrap; outline: none;
      letter-spacing: -0.01em;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Primary — GitHub blue flat */
    button.btn-primary {
      background: var(--accent);
      color: #fff; border: none;
      box-shadow: none;
    }
    button.btn-primary:hover:not(:disabled) {
      background: var(--accent-dim);
      box-shadow: none;
      transform: none;
    }
    button.btn-primary:active:not(:disabled) { opacity: 0.85; }

    /* Secondary — sidebar ghost */
    button.btn-secondary {
      background: rgba(255,255,255,0.07); color: var(--sb-text);
      border: 1px solid var(--sb-border);
    }
    button.btn-secondary:hover:not(:disabled) {
      background: rgba(255,255,255,0.14); color: #fff;
      border-color: rgba(165,180,252,0.45);
    }

    /* Green — flat */
    button.btn-green {
      background: var(--green);
      color: #fff; border: none;
      box-shadow: none;
    }
    button.btn-green:hover:not(:disabled) {
      background: var(--green-dim);
      box-shadow: none;
      transform: none;
    }

    /* Legacy aliases */
    button.btn-grey { background: rgba(255,255,255,0.07); color: var(--sb-dim); border: 1px solid var(--sb-border); }
    button.btn-grey:hover:not(:disabled) { background: rgba(255,255,255,0.12); color: #fff; }

    .btn-row { display: flex; gap: 6px; margin-top: 8px; }
    .btn-row button { flex: 1; }

    /* ── Modal action buttons (on white bg) ── */
    .modal-content button.btn-green {
      background: linear-gradient(135deg, var(--green), #0d9488);
      color: #fff;
    }
    .modal-content button.btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    /* ════════════════════════════════════
       DIVIDER
    ════════════════════════════════════ */
    .divider {
      width: 4px; background: transparent; cursor: col-resize; flex-shrink: 0;
      transition: background 0.2s;
    }
    .divider:hover, .divider.dragging {
      background: linear-gradient(to bottom, var(--accent), var(--accent2));
    }

    /* ════════════════════════════════════
       RIGHT PANE
    ════════════════════════════════════ */
    .right-pane {
      flex: 1; display: flex; flex-direction: column;
      padding: 16px; gap: 10px; overflow: hidden;
      background: var(--bg); min-width: 300px;
    }

    /* Chat header bar */
    .chat-header {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 10px 16px; flex-shrink: 0;
      box-shadow: var(--shadow);
    }
    .chat-header-label {
      font-size: 0.7em; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.09em; color: var(--text-muted); flex-shrink: 0;
    }
    .chat-header select {
      flex: 1; max-width: 260px; margin: 0;
      font-size: 0.875em; font-weight: 600;
    }
    .chat-header-badge {
      font-size: 0.68em; font-weight: 600;
      background: var(--accent);
      color: #fff; padding: 2px 8px;
      border-radius: 12px; flex-shrink: 0;
      box-shadow: none;
      letter-spacing: 0.03em;
    }
    /* Sidebar toggle button inside pane header */
    .sidebar-close-btn {
      margin-left: auto; flex-shrink: 0;
      width: 28px; height: 28px; border-radius: 7px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12) !important;
      color: #ccc; font-size: 13px !important;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s;
      box-shadow: none !important; transform: none !important;
      padding: 0 !important;
    }
    .sidebar-close-btn:hover {
      background: var(--accent) !important;
      border-color: var(--accent) !important;
      color: #fff !important;
      box-shadow: none !important; transform: none !important;
    }
    /* Open sidebar button in chat header */
    .sidebar-open-btn {
      display: none; width: 32px; height: 32px; border-radius: 6px; flex-shrink: 0;
      background: var(--accent); color: #fff; font-size: 14px !important;
      border: none !important; box-shadow: none !important;
      padding: 0 !important; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.15s;
      transform: none !important;
    }
    .sidebar-open-btn:hover { background: var(--accent-dim) !important; transform: none !important; }
    .sidebar-open-btn.visible { display: flex; }

    /* Chat container — no overflow:hidden so textarea can grow */
    .chat-container {
      flex: 1; display: flex; flex-direction: column;
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: visible; min-height: 0;
      box-shadow: var(--shadow);
    }

    /* Clip rounded corners on first/last children instead */
    .chat-messages {
      flex: 1; padding: 20px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 14px;
      background: var(--bg-surface);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    /* Vertical resize handle between messages and input */
    .chat-v-resize {
      height: 6px; flex-shrink: 0; cursor: row-resize;
      background: transparent; border-top: 1px solid var(--border);
      transition: background 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .chat-v-resize::after {
      content: ''; display: block; width: 36px; height: 3px;
      border-radius: 3px; background: var(--muted);
      transition: background 0.2s;
    }
    .chat-v-resize:hover, .chat-v-resize.dragging {
      background: var(--border);
    }
    .chat-v-resize:hover::after, .chat-v-resize.dragging::after {
      background: var(--accent);
    }

    .message {
      max-width: 78%; padding: 12px 16px;
      border-radius: 14px; font-size: 0.9em;
      line-height: 1.65; white-space: pre-wrap; word-break: break-word;
      animation: msgIn 0.2s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message.user {
      background: var(--accent);
      color: #fff; align-self: flex-end; border-bottom-right-radius: 3px;
      box-shadow: none;
    }
    .message.assistant {
      background: var(--bg-surface); color: var(--text);
      align-self: flex-start; border-bottom-left-radius: 3px;
      border: 1px solid var(--border);
      box-shadow: none;
    }

    /* Chat input area */
    .chat-input-row {
      display: flex; gap: 10px; padding: 12px 14px;
      background: var(--bg-panel); flex-shrink: 0;
      align-items: flex-end;
      border-top: 1px solid var(--border);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    }
    .chat-input-row textarea {
      flex: 1; resize: none; margin: 0;
      min-height: 44px; max-height: 320px;
      font-size: 0.9em; line-height: 1.5; border-radius: var(--radius);
      overflow-y: auto; transition: height 0.1s ease;
    }
    .chat-input-row button {
      height: 44px; width: 76px; flex-shrink: 0;
      font-size: 0.82em; border-radius: var(--radius);
      align-self: flex-end;
    }

    /* ── Forms ── */
    label {
      display: block; font-size: 0.78em; font-weight: 600;
      color: var(--text-dim); margin-bottom: 4px; margin-top: 12px;
    }
    input, textarea, select {
      width: 100%; padding: 8px 11px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg-input); color: var(--text);
      font-family: inherit; font-size: 0.875em; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: none;
    }
    select option { background: var(--bg-panel); }
    input[type="file"] { padding: 6px 10px; cursor: pointer; }

    /* ── Status bar ── */
    #statusBar {
      font-size: 0.78em; font-weight: 600;
      min-height: 30px; padding: 5px 14px;
      border-radius: var(--radius); display: flex; align-items: center;
      flex-shrink: 0; gap: 8px;
    }
    #statusBar.success { background: #14532d22; color: var(--green); border: 1px solid #15803d55; }
    #statusBar.error   { background: #7f1d1d22; color: var(--red);   border: 1px solid #dc262655; }
    #statusBar.info    { background: rgba(59,130,246,0.1); color: var(--accent); border: 1px solid rgba(59,130,246,0.3); }
    #statusBar.hidden  { visibility: hidden; }

    /* ── Modals ── */
    .modal {
      display: none; position: fixed; z-index: 100; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
    }
    .modal-content {
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: var(--radius-lg); margin: 7% auto;
      padding: 28px 30px; width: 90%; max-width: 480px;
      box-shadow: var(--shadow-lg);
      border-top: 2px solid var(--accent);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px; padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h3 {
      margin: 0; font-size: 1.05em; font-weight: 800;
      color: var(--text); letter-spacing: -0.02em;
    }
    .close {
      font-size: 1.1em; color: var(--text-muted); cursor: pointer;
      width: 28px; height: 28px; display: flex; align-items: center;
      justify-content: center; border-radius: 6px; transition: all 0.15s;
    }
    .close:hover { background: var(--bg-hover); color: var(--red); }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
  </style>
</head>
<body>
  <div class="container">

    <!-- ── Left Pane ── -->
    <div class="left-pane" id="leftPane">
      <div class="pane-header">
        <div class="pane-header-icon">&#9671;</div>
        <div>
          <div class="pane-header-title">Knowledge Base</div>
          <div class="pane-header-sub">Personal · Browser-native storage</div>
        </div>
        <button class="sidebar-close-btn" onclick="toggleSidebar()" title="Close sidebar">&#10005;</button>
      </div>

      <div class="left-top">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <div class="section-label" style="margin-bottom:0">Chats</div>
          <button onclick="newChatSession()" style="padding:2px 8px;font-size:0.7em;background:rgba(79,142,247,0.15);color:var(--accent);border:1px solid rgba(79,142,247,0.3);border-radius:5px;">+ New Chat</button>
        </div>
        <div id="sessionsList"></div>
        <div class="section-label" style="margin-top:12px">Collections</div>
        <div id="collectionList"></div>
      </div>

      <div class="left-bottom">
        <div class="action-grid">
          <button onclick="showNewCollectionModal()" class="btn-primary full">+ New Collection</button>
          <button onclick="showAddDocModal()" class="btn-secondary">↑ Add Doc</button>
          <button onclick="showGitHubModal()" class="btn-secondary">⎇ GitHub</button>
          <button onclick="showUrlModal()" class="btn-secondary">🌐 Web URL</button>
          <button onclick="exportKB()" class="btn-secondary">⬇ Export</button>
          <button onclick="triggerImport()" class="btn-secondary">⬆ Import</button>
        </div>
      </div>
    </div>

    <!-- ── Divider ── -->
    <div class="divider" id="paneDivider"></div>

    <!-- ── Right Pane ── -->
    <div class="right-pane" id="rightPane">
      <div class="chat-header">
        <button class="sidebar-open-btn" id="sidebarOpenBtn" onclick="toggleSidebar()" title="Open sidebar">&#9776;</button>
        <span class="chat-header-label">Context</span>
        <select id="chatCollection"><option value="all">All Collections</option></select>
        <span class="chat-header-badge">RAG</span>
        <button onclick="clearChat()" title="Clear chat history" style="margin-left:auto;padding:4px 10px;font-size:0.75em;background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);border-radius:6px;">&#128465; Clear Chat</button>
      </div>

      <div class="chat-container">
        <div id="chatMessages" class="chat-messages">
          <div class="message assistant">Hello! Select a collection and ask me anything about your documents.</div>
        </div>
        <div class="chat-v-resize" id="chatVResize"></div>
        <div class="chat-input-row">
          <textarea id="chatInput" placeholder="Ask a question…" onkeydown="handleKeyPress(event)"></textarea>
          <button onclick="sendMessage()" id="sendButton" class="btn-primary">Send</button>
        </div>
      </div>

      <div id="statusBar" class="hidden"></div>
    </div>
  </div>

  <!-- ── Modals ── -->
  <div id="newCollectionModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>New Collection</h3>
        <span class="close" onclick="closeModal('newCollectionModal')">&times;</span>
      </div>
      <label>Collection Name</label>
      <input id="newCollectionName" placeholder="e.g. Work Notes, Research, Personal"/>
      <div class="btn-row" style="margin-top:14px">
        <button onclick="doCreateCollection()" class="btn-green">Create</button>
      </div>
    </div>
  </div>

  <div id="addDocModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Add Document</h3>
        <span class="close" onclick="closeModal('addDocModal')">&times;</span>
      </div>
      <label>Collection</label>
      <select id="addDocCollection"></select>
      <label style="margin-top:12px">Upload file(s) <span style="color:var(--text-dim);font-size:0.85em">(txt, md, csv, code)</span></label>
      <input type="file" id="addDocFile" multiple accept=".txt,.md,.csv,.py,.js,.ts,.json,.yaml,.yml,.html,.xml"
        style="padding:6px;cursor:pointer"/>
      <label style="margin-top:10px">— or paste text —</label>
      <textarea id="addDocText" rows="5" placeholder="Paste document content here…"></textarea>
      <label>Filename (for pasted text)</label>
      <input id="addDocFilename" placeholder="my-note.txt"/>
      <input type="hidden" id="addDocEnhanced" value="true"/>
      <div class="btn-row" style="margin-top:14px">
        <button onclick="doAddDocument()" class="btn-green">Add Document</button>
      </div>
    </div>
  </div>

  <!-- GitHub ingest modal -->
  <div id="githubModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Ingest GitHub Repo</h3>
        <span class="close" onclick="closeModal('githubModal')">&times;</span>
      </div>
      <label>Collection</label>
      <select id="githubCollection"></select>
      <label style="margin-top:10px">Repository URL</label>
      <input id="githubUrl" placeholder="https://github.com/user/repo"/>
      <input type="hidden" id="githubEnhanced" value="true"/>
      <div id="githubStatus" style="margin-top:10px;font-size:0.82em;color:var(--text-dim);min-height:18px"></div>
      <div class="btn-row" style="margin-top:14px">
        <button onclick="doIngestGitHub()" class="btn-green" id="githubIngestBtn">Clone &amp; Ingest</button>
      </div>
    </div>
  </div>

  <!-- Web URL ingest modal -->
  <div id="urlModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Ingest Web Page</h3>
        <span class="close" onclick="closeModal('urlModal')">&times;</span>
      </div>
      <label>Collection</label>
      <select id="urlCollection"></select>
      <label style="margin-top:10px">Page URL</label>
      <input id="urlInput" placeholder="https://example.com/article" type="url"/>
      <div id="urlStatus" style="margin-top:10px;font-size:0.82em;color:var(--text-dim);min-height:18px"></div>
      <div class="btn-row" style="margin-top:14px">
        <button onclick="doIngestUrl()" class="btn-green" id="urlIngestBtn">Fetch &amp; Ingest</button>
      </div>
    </div>
  </div>

  <script src="./static/config.js"></script>
  <script src="./static/app.js"></script>
  <script>
    // ── Auto-grow textarea ──
    const chatInput = document.getElementById('chatInput');
    chatInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 320) + 'px';
    });

    // ── Sidebar toggle ──
    function toggleSidebar() {
      const lp  = document.getElementById('leftPane');
      const dv  = document.getElementById('paneDivider');
      const btn = document.getElementById('sidebarOpenBtn');
      const hidden = lp.classList.toggle('hidden');
      dv.style.display = hidden ? 'none' : '';
      btn.classList.toggle('visible', hidden);
    }

    // ── Vertical chat resize ──
    (function() {
      const handle = document.getElementById('chatVResize');
      const msgs   = document.getElementById('chatMessages');
      let dragging = false, startY = 0, startH = 0;
      handle.addEventListener('mousedown', e => {
        dragging = true; startY = e.clientY;
        startH = msgs.getBoundingClientRect().height;
        handle.classList.add('dragging');
        document.body.style.userSelect = 'none';
      });
      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const delta = e.clientY - startY;
        const newH = Math.max(80, startH + delta);
        msgs.style.flex = 'none';
        msgs.style.height = newH + 'px';
      });
      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.body.style.userSelect = '';
      });
    })();
  </script>
</body>
</html>
