name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: lint + test ─────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      MOCK_LLM: "1"           # no real HF calls during tests
      HF_ACCESS_TOKEN: "mock"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  # ── CD: push to HF Spaces ───────────────────────────────────────────────────
  deploy:
    name: Deploy to HF Spaces
    runs-on: ubuntu-latest
    needs: test                 # only deploy if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0        # full history so force-push works cleanly

      - name: Push to HF Spaces
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git remote add hf-space \
            "https://muskankhaneja03:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/muskankhaneja03/RAG-KnowledgeAgent"
          git push hf-space main --force
