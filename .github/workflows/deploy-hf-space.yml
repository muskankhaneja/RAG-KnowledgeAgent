name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deployment directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .hf-space-deploy
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.hf-space-deploy' \
            ./ .hf-space-deploy/
          cp HF_SPACES_README.md .hf-space-deploy/README.md
          rm -f .hf-space-deploy/HF_SPACES_README.md

      - name: Push to Hugging Face Space
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$HF_USERNAME"
          test -n "$HF_TOKEN"
          test -n "$HF_SPACE_ID"
          cd .hf-space-deploy
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy from GitHub Actions" || echo "No changes to commit"
          git remote add space "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}"
          git push --force space HEAD:main
