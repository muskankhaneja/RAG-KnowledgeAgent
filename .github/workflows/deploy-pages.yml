name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build static site
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          mkdir -p _site/static

          # Copy static assets
          cp src/static/index.html _site/index.html
          cp src/static/app.js     _site/static/app.js

          # Generate config.js — injects the Render backend URL
          if [ -n "$API_BASE_URL" ]; then
            echo "window.API_BASE_URL = '${API_BASE_URL}';" > _site/static/config.js
          else
            echo "// API_BASE_URL secret not set — falls back to same origin" > _site/static/config.js
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
